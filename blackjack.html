<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KyZXEAg3QhqLMpG8r+8fhAXLRk2vvoC2f3B09zVXn8CA5QIVfZOJ3BCsw2P0p/We" crossorigin="anonymous">
    <link rel="stylesheet" href="blackjack.css">
    <title>blackjack</title>
</head>
<body>
    <div class="outermostContainer">
        <h2 id="challenge">Challenge 5: Blackjack</h2>
        <h3><spna id="blackjack-conclusion">Let's play</spna></h3>
        
        <div class="cardThrowTable">
            <div id="your-box">
                <h2 id="you">You: <span id="your-blackjack-result">0</span></h2>
            </div>
            <div id="dealer-box">
                <h2>Dealer: <span id="dealer-blackjack-result">0</span></h2>
            </div>
        </div>

        <div class="buttonsOnTable">
            <div id="buttonContainerClass">
                <button class="btn-lg btn-primary mr-2" id="blackjack-Hit-button">Hit</button>
                <button class="btn-lg btn-warning mr-2" id="blackjack-Stand-button">Stand</button>
                <button class="btn-lg btn-danger mr-2" id="blackjack-Deal-button">Deal</button>
            </div>
        </div>
        <div class="scoreBoard">
            <table>
                <thead>
                    <tr>
                        <th>wins</th>
                        <th>loses</th>
                        <th>draws</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td><span id="wins">0</span></td>
                        <td><span id="loses">0</span></td>
                        <td><span id="draws">0</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script src="blackjack.js"></script>
</body>
</html>
